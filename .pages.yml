# Lokalizacja plików multimedialnych (zdjęcia, skany, mapy)
# Nowe pliki z CMS trafiają do src/assets/images, aby Astro mogło je optymalizować.
# Obrazy treści są utrzymywane wyłącznie w src/assets/images.
media:
  - name: uklad-urbanistyczny-images
    label: Obrazy artykułów o układzie urbanistycznym
    input: src/assets/images/uklad-urbanistyczny
    output: ../../../../assets/images/uklad-urbanistyczny
    rename: safe
    categories:
      - image
  - name: architektura-images
    label: Obrazy artykułów o architekturze
    input: src/assets/images/architektura
    output: ../../../../assets/images/architektura
    rename: safe
    categories:
      - image
  - name: utracone-images
    label: Obrazy dziedzictwa utraconego
    input: src/assets/images/utracone
    output: ../../../../assets/images/utracone
    rename: safe
    categories:
      - image
  - name: przyroda-images
    label: Obrazy artykułów przyrodniczych
    input: src/assets/images/przyroda
    output: ../../../assets/images/przyroda
    rename: safe
    categories:
      - image
  - name: ludzie-images
    label: Portrety i ilustracje biograficzne
    input: src/assets/images/ludzie
    output: ../../../assets/images/ludzie
    rename: safe
    categories:
      - image
  - name: biblioteka-images
    label: Skany i ilustracje biblioteki
    input: src/assets/images/biblioteka
    output: ../../../assets/images/biblioteka
    rename: safe
    categories:
      - image

# Kolekcje treści – każda odpowiada sekcji w wiki
content:
  # ── Dziedzictwo: Układ urbanistyczny ──────────────────────────────────
  - name: uklad-urbanistyczny
    label: Układ urbanistyczny
    path: src/content/docs/dziedzictwo/uklad-urbanistyczny
    type: collection
    fields:
      - name: title
        label: Tytuł hasła
        type: string
        required: true
      - name: description
        label: Krótki opis (dla wyszukiwarek)
        type: string
      - name: tags
        label: Tagi
        type: string
        list: true
      - name: image
        label: Zdjęcie główne
        type: image
        options:
          media: uklad-urbanistyczny-images
      - name: image_alt
        label: Tekst alternatywny zdjęcia (opis dla wyszukiwarek i czytników ekranu)
        type: string
      - name: body
        label: Treść artykułu
        type: rich-text
        options:
          format: markdown
          media: uklad-urbanistyczny-images

  # ── Dziedzictwo: Architektura ─────────────────────────────────────────
  - name: architektura
    label: Architektura
    path: src/content/docs/dziedzictwo/architektura
    type: collection
    fields:
      - name: title
        label: Tytuł hasła
        type: string
        required: true
      - name: description
        label: Krótki opis
        type: string
      - name: rok_budowy
        label: Rok budowy
        type: string
      - name: status
        label: Status obiektu
        type: select
        options:
          - Istniejący
          - Ruina
          - Nieistniejący
          - W remoncie
      - name: tags
        label: Tagi
        type: string
        list: true
      - name: image
        label: Zdjęcie główne
        type: image
        options:
          media: architektura-images
      - name: image_alt
        label: Tekst alternatywny zdjęcia (opis dla wyszukiwarek i czytników ekranu)
        type: string
      - name: body
        label: Treść artykułu
        type: rich-text
        options:
          format: markdown
          media: architektura-images

  # ── Dziedzictwo utracone ──────────────────────────────────────────────
  - name: utracone
    label: Dziedzictwo utracone
    path: src/content/docs/dziedzictwo/utracone
    type: collection
    fields:
      - name: title
        label: Tytuł hasła
        type: string
        required: true
      - name: description
        label: Krótki opis
        type: string
      - name: rok_zniszczenia
        label: Rok zniszczenia / rozbiórki
        type: string
      - name: tags
        label: Tagi
        type: string
        list: true
      - name: image
        label: Zdjęcie historyczne
        type: image
        options:
          media: utracone-images
      - name: image_alt
        label: Tekst alternatywny zdjęcia (opis dla wyszukiwarek i czytników ekranu)
        type: string
      - name: body
        label: Treść artykułu
        type: rich-text
        options:
          format: markdown
          media: utracone-images

  # ── Przyroda ──────────────────────────────────────────────────────────
  - name: przyroda
    label: Przyroda
    path: src/content/docs/przyroda
    type: collection
    fields:
      - name: title
        label: Tytuł hasła
        type: string
        required: true
      - name: description
        label: Krótki opis
        type: string
      - name: tags
        label: Tagi
        type: string
        list: true
      - name: image
        label: Zdjęcie główne
        type: image
        options:
          media: przyroda-images
      - name: image_alt
        label: Tekst alternatywny zdjęcia (opis dla wyszukiwarek i czytników ekranu)
        type: string
      - name: body
        label: Treść artykułu
        type: rich-text
        options:
          format: markdown
          media: przyroda-images

  # ── Ludzie ────────────────────────────────────────────────────────────
  - name: ludzie
    label: Ludzie
    path: src/content/docs/ludzie
    type: collection
    fields:
      - name: title
        label: Imię i nazwisko
        type: string
        required: true
      - name: description
        label: Kim był(a)?
        type: string
      - name: lata_zycia
        label: Lata życia
        type: string
      - name: tags
        label: Tagi
        type: string
        list: true
      - name: image
        label: Portret / zdjęcie
        type: image
        options:
          media: ludzie-images
      - name: image_alt
        label: Tekst alternatywny zdjęcia (opis dla wyszukiwarek i czytników ekranu)
        type: string
      - name: body
        label: Biogram
        type: rich-text
        options:
          format: markdown
          media: ludzie-images

  # ── Biblioteka ────────────────────────────────────────────────────────
  - name: biblioteka
    label: Biblioteka
    path: src/content/docs/biblioteka
    type: collection
    fields:
      - name: title
        label: Tytuł dokumentu
        type: string
        required: true
      - name: description
        label: Opis dokumentu
        type: string
      - name: rok
        label: Rok powstania
        type: string
      - name: zrodlo
        label: Źródło
        type: string
      - name: tags
        label: Tagi
        type: string
        list: true
      - name: image
        label: Miniatura / skan okładki
        type: image
        options:
          media: biblioteka-images
      - name: image_alt
        label: Tekst alternatywny zdjęcia (opis dla wyszukiwarek i czytników ekranu)
        type: string
      - name: body
        label: Treść / transkrypcja
        type: rich-text
        options:
          format: markdown
          media: biblioteka-images
