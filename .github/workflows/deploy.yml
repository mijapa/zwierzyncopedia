# GitHub Actions – automatyczna publikacja Zwierzyńcopedia na GitHub Pages
# Każdy push do gałęzi main powoduje przebudowę i publikację strony.

name: Publikuj Zwierzyńcopedia

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# Zapobiega równoległym deploymentom
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalacja zależności
        run: npm ci

      - name: Budowanie strony
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
