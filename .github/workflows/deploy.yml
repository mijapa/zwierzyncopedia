# GitHub Actions – automatyczna publikacja Zwierzyńcopedia na GitHub Pages
# Każdy push do gałęzi main powoduje przebudowę i publikację strony.

name: Publikuj Zwierzyńcopedia

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# Zapobiega równoległym deploymentsm
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache zależności pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalacja zależności
        run: pip install -r requirements.txt

      - name: Budowanie strony
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
