# GitHub Actions – walidacja jakości treści Zwierzyńcopedia
# Uruchamiana przy każdym Pull Request do gałęzi main

name: Walidacja jakości treści

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Walidacja składni Markdown
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: "src/content/docs/**/*.md src/content/docs/**/*.mdx README.md"
          config: ".markdownlint.yml"

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Walidacja plików YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
          # Pliki YAML do walidacji
          file_or_dir: ".yamllint.yml .markdownlint.yml .pre-commit-config.yaml .pages.yml .github/workflows/"
          strict: false

  vale:
    name: Vale
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Uruchom pre-commit dla Vale
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: vale --all-files
