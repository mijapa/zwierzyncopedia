# =============================================================================
# Zwierzyńcopedia – Cyfrowe Repozytorium Dziedzictwa Miasta-Ogrodu
# Konfiguracja MkDocs z motywem Material
# =============================================================================

site_name: Zwierzyńcopedia
site_url: https://mijapa.github.io/zwierzyncopedia/
site_description: >-
  Cyfrowe repozytorium dziedzictwa Zwierzyńca – miasta-ogrodu na Roztoczu.
  Encyklopedia historii, architektury, przyrody i ludzi.
site_author: Stowarzyszenie im. Aleksandry Wachniewskiej

repo_url: https://github.com/mijapa/zwierzyncopedia
repo_name: mijapa/zwierzyncopedia
edit_uri: edit/main/docs/

# =============================================================================
# Motyw Material
# =============================================================================
theme:
  name: material
  language: pl  # Polski interfejs (Szukaj, Dalej, Wstecz, itp.)
  custom_dir: overrides

  palette:
    # Tryb jasny
    - scheme: default
      primary: teal       # Kolorystyka „leśna" – nawiązanie do Roztocza
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Przełącz na tryb ciemny

    # Tryb ciemny
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Przełącz na tryb jasny

  font:
    text: Roboto
    code: Roboto Mono

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

  features:
    # Nawigacja
    - navigation.tabs           # Menu górne w stylu wiki/portalu
    - navigation.tabs.sticky    # Zakładki widoczne przy przewijaniu
    - navigation.indexes        # Klikalne nagłówki sekcji
    - navigation.sections       # Rozwinięte sekcje w menu bocznym
    - navigation.top            # Przycisk „Wróć na górę"
    - navigation.footer         # Nawigacja Dalej/Wstecz w stopce

    # Wyszukiwarka
    - search.suggest            # Podpowiedzi w wyszukiwarce
    - search.highlight          # Podświetlanie wyników
    - search.share              # Udostępnianie wyników wyszukiwania

    # Treść
    - content.action.edit       # Przycisk „Edytuj tę stronę"
    - content.tabs.link         # Synchronizowane zakładki w treści
    - toc.integrate             # Spis treści zintegrowany z nawigacją

# =============================================================================
# Wtyczki
# =============================================================================
plugins:
  - search:
      lang: pl
  - tags                        # System tagów/kategorii

# =============================================================================
# Rozszerzenia Markdown
# =============================================================================
markdown_extensions:
  # Typografia i formatowanie
  - abbr                        # Skróty (np. RPN -> Roztoczański Park Narodowy)
  - admonition                  # Bloki „Ciekawostka", „Uwaga", „Cytat"
  - attr_list                   # Atrybuty HTML na elementach
  - def_list                    # Listy definicji
  - footnotes                   # Przypisy dolne (kluczowe dla encyklopedii)
  - md_in_html                  # Markdown w blokach HTML
  - tables                      # Tabele

  # Rozszerzenia PyMdown
  - pymdownx.details            # Rozwijane bloki (spoilery)
  - pymdownx.superfences        # Zaawansowane bloki kodu
  - pymdownx.tabbed:            # Zakładki w treści
      alternate_style: true
  - pymdownx.emoji:             # Ikony Material Design
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:         # Podświetlanie składni
      anchor_linenums: true
  - pymdownx.mark               # Podświetlanie tekstu (==tekst==)
  - pymdownx.tilde              # Przekreślenie (~~tekst~~)
  - pymdownx.caret              # Indeks górny (^tekst^)

  # Spis treści
  - toc:
      permalink: true           # Kotwice przy nagłówkach
      toc_depth: 3

# =============================================================================
# Nawigacja – Architektura Treści wzorowana na ontologii miasta
# =============================================================================
nav:
  - Strona główna: index.md

  - Dziedzictwo:
    - dziedzictwo/index.md
    - Układ urbanistyczny:
      - dziedzictwo/uklad-urbanistyczny/index.md
      - Osie widokowe: dziedzictwo/uklad-urbanistyczny/osie-widokowe.md
      - System wodny: dziedzictwo/uklad-urbanistyczny/system-wodny.md
    - Architektura:
      - dziedzictwo/architektura/index.md
      - Willa Zamoyskich: dziedzictwo/architektura/willa-zamoyskich.md
      - Zarząd Ordynacji: dziedzictwo/architektura/zarzad-ordynacji.md
      - Kościół na Wodzie: dziedzictwo/architektura/kosciol-na-wodzie.md
    - Dziedzictwo utracone:
      - dziedzictwo/utracone/index.md
      - Dworzec kolejowy: dziedzictwo/utracone/dworzec-kolejowy.md

  - Przyroda:
    - przyroda/index.md
    - Pomniki przyrody: przyroda/pomniki-przyrody.md
    - Stawy Echo: przyroda/stawy-echo.md
    - Rzeka Wieprz: przyroda/rzeka-wieprz.md
    - Park Środowiskowy: przyroda/park-srodowiskowy.md

  - Ludzie:
    - ludzie/index.md
    - Aleksandra Wachniewska: ludzie/aleksandra-wachniewska.md
    - Ordynaci Zamojscy: ludzie/ordynaci-zamojscy.md

  - Biblioteka:
    - biblioteka/index.md
    - Dokumenty źródłowe: biblioteka/dokumenty-zrodlowe.md
    - Mapy i plany: biblioteka/mapy-i-plany.md

  - O projekcie:
    - o-projekcie/index.md
    - Jak edytować: o-projekcie/jak-edytowac.md
    - Zasady redakcyjne: o-projekcie/zasady-redakcyjne.md

# =============================================================================
# Dodatkowe ustawienia
# =============================================================================
extra:
  social:
    - icon: fontawesome/brands/github
