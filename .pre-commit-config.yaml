# Konfiguracja pre-commit hooks dla Zwierzyńcopedia
# Instalacja: pip install pre-commit && pre-commit install
# https://pre-commit.com

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: '^mkdocs\.yml$'  # mkdocs.yml używa tagów !!python/name: nieobsługiwanych przez safe_load
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.yml]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [--config-file, .yamllint.yml]
        exclude: '^mkdocs\.yml$'  # mkdocs.yml używa tagów !!python/name: nieobsługiwanych przez yamllint
